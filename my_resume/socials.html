<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anam Ibn Jafar — Socials</title>
    <meta name="description" content="Connect with Anam Ibn Jafar — find all social links, email, phone, and more." />
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <link rel="stylesheet" href="css/style.css?v=2" />
    <style>
      .socials-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 2rem;
      }

      .socials-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .socials-card {
        position: relative;
        z-index: 1;
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: 24px;
        padding: 3rem 2.5rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 24px 60px var(--c-shadow);
        transition: background 0.4s var(--ease), border-color 0.4s var(--ease);
      }

      .socials-header {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        margin-bottom: 2rem;
      }

      .socials-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--c-border);
        flex-shrink: 0;
        transition: border-color 0.4s var(--ease);
      }

      .socials-info {
        text-align: left;
      }

      .socials-name {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.15rem;
      }

      .socials-title {
        font-size: 0.9rem;
        color: var(--c-text-2);
      }

      .socials-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .social-link {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.25rem;
        background: var(--c-bg-2);
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        text-decoration: none;
        color: var(--c-text);
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.3s var(--ease);
      }

      .social-link:hover {
        border-color: var(--c-accent);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px var(--c-shadow);
      }

      .social-link-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: var(--c-accent-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--c-text-2);
      }

      .social-link-icon svg {
        width: 20px;
        height: 20px;
      }

      .social-link-text {
        text-align: left;
      }

      .social-link-label {
        display: block;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--c-text-3);
        margin-bottom: 0.1rem;
      }

      .social-link-value {
        font-size: 0.9rem;
        color: var(--c-text);
      }

      .social-link-arrow {
        margin-left: auto;
        color: var(--c-text-3);
        transition: transform 0.3s var(--ease), color 0.3s var(--ease);
      }

      .social-link:hover .social-link-arrow {
        transform: translateX(3px);
        color: var(--c-text);
      }

      .social-link-arrow svg {
        width: 16px;
        height: 16px;
      }

      .socials-theme-toggle {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 10;
      }

      .social-copy-btn {
        margin-left: auto;
        background: none;
        border: 1px solid var(--c-border);
        border-radius: 8px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--c-text-3);
        flex-shrink: 0;
        position: relative;
        transition: all 0.3s var(--ease);
      }

      .social-copy-btn:hover {
        border-color: var(--c-accent);
        color: var(--c-text);
      }

      .social-copy-btn svg {
        width: 16px;
        height: 16px;
      }

      .social-copy-btn .copy-check {
        display: none;
      }

      .social-copy-btn.copied .copy-icon {
        display: none;
      }

      .social-copy-btn.copied .copy-check {
        display: block;
        color: #22c55e;
      }

      .social-copy-btn::after {
        content: 'Copied!';
        position: absolute;
        top: -32px;
        left: 50%;
        transform: translateX(-50%) scale(0.8);
        background: var(--c-accent);
        color: var(--c-bg);
        font-size: 0.7rem;
        font-weight: 600;
        padding: 0.25rem 0.6rem;
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: all 0.25s var(--ease);
      }

      .social-copy-btn.copied::after {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }

      @media (max-width: 520px) {
        .socials-card {
          padding: 2rem 1.5rem;
          border-radius: 20px;
        }

        .socials-name {
          font-size: 1.4rem;
        }

        .social-link {
          padding: 0.85rem 1rem;
          gap: 0.75rem;
        }

        .social-link-icon {
          width: 38px;
          height: 38px;
        }

        .social-link-value {
          font-size: 0.82rem;
        }
      }
    </style>
  </head>

    <script>
      // Theme
      const html = document.documentElement;
      const themeBtn = document.getElementById("theme-toggle");
      const stored = localStorage.getItem("theme");
      if (stored) {
        html.setAttribute("data-theme", stored);
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        html.setAttribute("data-theme", "dark");
      }
      themeBtn.addEventListener("click", () => {
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      });

      // Particle animation (same as landing page)
      const dotCanvas = document.getElementById("hero-dots");
      const ctx = dotCanvas.getContext("2d");
      const page = dotCanvas.parentElement;
      let particles = [];
      let mouse = { x: -1000, y: -1000 };
      const COUNT = 80;
      const CONNECT_DIST = 150;
      const MOUSE_RADIUS = 180;

      function resize() {
        dotCanvas.width = page.offsetWidth;
        dotCanvas.height = page.offsetHeight;
      }

      function init() {
        particles = [];
        for (let i = 0; i < COUNT; i++) {
          particles.push({
            x: Math.random() * dotCanvas.width,
            y: Math.random() * dotCanvas.height,
            vx: (Math.random() - 0.5) * 0.6,
            vy: (Math.random() - 0.5) * 0.6,
            r: Math.random() * 1.5 + 1,
          });
        }
      }

      function isDark() {
        return document.documentElement.getAttribute("data-theme") === "dark";
      }

      function draw() {
        ctx.clearRect(0, 0, dotCanvas.width, dotCanvas.height);
        const baseColor = isDark() ? "255,255,255" : "0,0,0";
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          const dx = mouse.x - p.x;
          const dy = mouse.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MOUSE_RADIUS && dist > 0) {
            const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS * 0.02;
            p.vx += dx * force;
            p.vy += dy * force;
          }
          p.vx *= 0.99;
          p.vy *= 0.99;
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = dotCanvas.width;
          if (p.x > dotCanvas.width) p.x = 0;
          if (p.y < 0) p.y = dotCanvas.height;
          if (p.y > dotCanvas.height) p.y = 0;
          const dotAlpha = dist < MOUSE_RADIUS ? 0.5 : 0.2;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${baseColor},${dotAlpha})`;
          ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            const p2 = particles[j];
            const ldx = p.x - p2.x;
            const ldy = p.y - p2.y;
            const lineDist = Math.sqrt(ldx * ldx + ldy * ldy);
            if (lineDist < CONNECT_DIST) {
              const lineAlpha = (1 - lineDist / CONNECT_DIST) * 0.15;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = `rgba(${baseColor},${lineAlpha})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }

      // Copy buttons
      document.querySelectorAll(".social-copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          navigator.clipboard.writeText(btn.dataset.copy);
          btn.classList.add("copied");
          setTimeout(() => btn.classList.remove("copied"), 1500);
        });
      });

      page.addEventListener("mousemove", (e) => {
        const rect = page.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });
      page.addEventListener("mouseleave", () => { mouse.x = -1000; mouse.y = -1000; });
      window.addEventListener("resize", () => { resize(); init(); });
      resize();
      init();
      draw();
    </script>
