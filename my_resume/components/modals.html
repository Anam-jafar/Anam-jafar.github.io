<!-- ========== INTRO VIDEO MODAL ========== -->
<div class="modal" id="intro-modal">
  <div class="intro-modal-box">
    <button class="intro-close" id="close-intro" aria-label="Close">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 4L4 14M4 4l10 10"/></svg>
    </button>
    <div class="intro-vid">
      <iframe id="intro-video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>
</div>

<!-- ========== MODAL ========== -->
<div class="modal" id="project-modal">
  <div class="modal-box">
    <div class="modal-top">
      <h2 id="modal-title"></h2>
      <button class="modal-x" id="close-modal" aria-label="Close">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 4L4 14M4 4l10 10"/></svg>
      </button>
    </div>
    <div class="modal-inner">
      <div class="modal-vid" id="modal-vid">
        <iframe id="modal-video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="modal-gallery" id="modal-gallery" style="display:none;">
        <div class="gallery-main">
          <button class="gallery-arrow gallery-prev" id="gallery-prev" aria-label="Previous">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>

          </button>
        </div>
        <div class="gallery-dots" id="gallery-dots"></div>
      </div>
      <div class="modal-cols">
        <div>
          <h3>Key Features</h3>
          <ul id="modal-features" class="modal-feat"></ul>
        </div>
        <div>
          <h3>Technologies</h3>

        </div>

      <div class="modal-desc">
        <h3>Overview</h3>
        <p id="modal-description"></p>

    </div>
  </div>
