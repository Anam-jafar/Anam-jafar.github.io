<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anam Ibn Jafar — Software Engineer</title>
    <meta name="description" content="Software Engineer specializing in full-stack development, building scalable applications with Laravel, React, and cloud technologies." />
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <link rel="stylesheet" href="css/style.css?v=2" />
  </head>
  <body>

    <div id="component-nav"></div>
    <div id="component-hero"></div>
    <div id="component-about"></div>
    <div id="component-experience"></div>
    <div id="component-projects"></div>
    <div id="component-blog"></div>
    <div id="component-contact"></div>
    <div id="component-footer"></div>
    <div id="component-modals"></div>

    <script>
      (async function loadComponents() {
        const components = [
          { id: "component-nav", file: "components/nav.html" },
          { id: "component-hero", file: "components/hero.html" },
          { id: "component-about", file: "components/about.html" },
          { id: "component-experience", file: "components/experience.html" },
          { id: "component-projects", file: "components/projects.html" },
          { id: "component-blog", file: "components/blog.html" },
          { id: "component-contact", file: "components/contact.html" },
          { id: "component-footer", file: "components/footer.html" },
          { id: "component-modals", file: "components/modals.html" },
        ];

        await Promise.all(
          components.map(async ({ id, file }) => {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
          })
        );

        // Load main.js after all components are injected
        const script = document.createElement("script");
        script.src = "js/main.js";
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
